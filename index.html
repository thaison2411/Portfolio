<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Creative Portfolio | Video & Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover {
            transform: translateY(-8px);
            border-color: #38bdf8;
            box-shadow: 0 20px 40px -15px rgba(56, 189, 248, 0.2);
        }
        .gradient-text {
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-sans antialiased">

    <nav class="flex justify-between items-center p-8 max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold tracking-tighter uppercase">Portfolio<span class="text-sky-400">.</span></h1>
        <div class="hidden md:flex space-x-8 text-sm font-medium opacity-70">
            <a href="#" class="hover:text-sky-400 transition">Công việc</a>
            <a href="#" class="hover:text-sky-400 transition">Về tôi</a>
            <a href="mailto:your-email@gmail.com" class="px-5 py-2 bg-sky-500 text-white rounded-full hover:bg-sky-400 transition shadow-lg shadow-sky-500/20">Liên hệ</a>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto text-center py-24 px-6">
        <h2 class="text-5xl md:text-7xl font-extrabold mb-8 gradient-text leading-tight">
            Sáng tạo nội dung số <br>& Visual Design.
        </h2>
        <p class="text-lg opacity-60 max-w-xl mx-auto leading-relaxed">
            Danh sách các dự án được cập nhật tự động từ hệ thống quản lý dữ liệu.
        </p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-32">
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="col-span-full flex flex-col items-center justify-center py-20">
                <div class="loader mb-4"></div>
                <p class="opacity-50">Đang tải dự án...</p>
            </div>
        </div>
    </main>

    <footer class="border-t border-white/5 py-16 text-center">
        <p class="text-sm opacity-40 font-light">&copy; 2026 Crafted by Your Name. Built with Passion.</p>
    </footer>

    <script>
    const API_URL = 'https://sheetdb.io/api/v1/gc6oxtaogfpu6';

    async function renderPortfolio() {
        const grid = document.getElementById('portfolio-grid');
        
        try {
            const response = await fetch(API_URL);
            const projects = await response.json();

            if (!projects || projects.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center opacity-50">Hiện chưa có dự án nào.</p>';
                return;
            }

            grid.innerHTML = ''; 

            projects.forEach(item => {
                // KHỚP TÊN TRƯỜNG VỚI EXCEL (Viết hoa chữ cái đầu)
                const type = item.Type ? item.Type.toLowerCase() : 'image';
                const projectLink = item.Link || '#';
                const projectTitle = item.Title || 'Không có tiêu đề';
                const projectDesc = item.Description || 'Không có mô tả cho dự án này.';
                
                let mediaHtml = '';
                if (type === 'video') {
                    // Tự động xử lý nếu link là watch?v= thành /embed/ để xem được trên web
                    let embedLink = projectLink.replace("watch?v=", "embed/");
                    mediaHtml = `<iframe class="w-full h-full" src="${embedLink}" frameborder="0" allowfullscreen></iframe>`;
                } else {
                    mediaHtml = `<img src="${projectLink}" alt="${projectTitle}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">`;
                }

                const cardHtml = `
                    <div class="glass-card rounded-3xl overflow-hidden group">
                        <div class="aspect-video bg-gray-900 relative overflow-hidden">
                            ${mediaHtml}
                        </div>
                        <div class="p-8">
                            <a href="${projectLink}" target="_blank" class="block group/title">
                                <h3 class="text-xl font-bold group-hover/title:text-sky-400 transition flex items-center gap-2">
                                    ${projectTitle}
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-0 group-hover/title:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                    </svg>
                                </h3>
                            </a>
                            <p class="text-sm opacity-50 mt-3 leading-relaxed font-light">
                                ${projectDesc}
                            </p>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            });
        } catch (error) {
            console.error("Lỗi:", error);
            grid.innerHTML = `<p class="col-span-full text-center text-red-400">Không thể tải dữ liệu. Kiểm tra lại kết nối Internet hoặc API.</p>`;
        }
    }

    document.addEventListener('DOMContentLoaded', renderPortfolio);
</script>
</body>
</html>
